<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Virtual Room — Audience</title>
  <base href="/" />
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #0e1016;
      --panel: #171b24;
      --line: #262c38;
      --text: #e6e9f0;
      --dim: #8891a3;
      --accent: #ffd640;
      --cyan: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    #app { max-width: 1180px; margin: 0 auto; padding: 20px 20px 60px; }

    .boot { color: var(--dim); padding: 60px 0; text-align: center; }

    /* --- the 3D stage --- */

    .stage {
      position: relative;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: #0a0c10;
      aspect-ratio: 16 / 9;
    }

    #stage { display: block; width: 100%; height: 100%; cursor: grab; }
    #stage:active { cursor: grabbing; }

    .hud {
      position: absolute;
      top: 16px;
      left: 18px;
      padding: 12px 16px;
      background: rgba(10, 12, 16, .62);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, .09);
      border-radius: 10px;
      min-width: 220px;
      pointer-events: none;
    }

    .hud-mood { font-size: 22px; font-weight: 650; letter-spacing: -.01em; }
    .hud-meters { display: flex; flex-direction: column; gap: 4px; margin: 8px 0 6px; }
    .hud-meter { height: 5px; background: rgba(255, 255, 255, .1); border-radius: 99px; overflow: hidden; }
    .hud-meter i { display: block; height: 100%; border-radius: 99px; transition: width .1s linear; }
    .hud-legend { font-size: 11px; color: var(--dim); letter-spacing: .02em; }

    .banner {
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.01em;
      text-shadow: 0 2px 18px rgba(0, 0, 0, .55);
      pointer-events: none;
      white-space: nowrap;
    }

    .viewtoggle {
      position: absolute;
      bottom: 14px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .viewtoggle button {
      background: rgba(10, 12, 16, .66);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, .12);
      color: var(--text);
      font-size: 12px;
      padding: 6px 11px;
      border-radius: 7px;
      cursor: pointer;
    }
    .viewtoggle button.on { background: var(--cyan); color: #04212a; border-color: var(--cyan); font-weight: 600; }
    .drag-hint { font-size: 11px; color: rgba(255, 255, 255, .45); }

    /* --- panels --- */

    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    @media (max-width: 860px) { .panels { grid-template-columns: 1fr; } }

    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; }

    .panel h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--dim);
      margin: 0 0 12px;
      font-weight: 600;
    }

    .btns { display: flex; flex-wrap: wrap; gap: 8px; }

    button {
      background: #232936;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #2d3444; }
    button.primary { background: var(--accent); color: #1a1204; border-color: var(--accent); font-weight: 600; }
    button.live { background: #16a34a; border-color: #16a34a; color: #fff; font-weight: 600; }

    .row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
    .row > span:first-child { width: 78px; color: var(--dim); flex: none; }
    .row output { width: 46px; text-align: right; color: var(--dim); font-variant-numeric: tabular-nums; }
    input[type=range] { flex: 1; accent-color: var(--accent); }

    .hint { color: var(--dim); font-size: 12.5px; margin: 10px 0 0; }
    code { background: #0b0e13; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  </style>
</head>

<body>
  <div id="app">
    <p class="boot">Building the room…</p>
  </div>

  <script>
    // Blazor boots asynchronously and so does the scene module; this lets the C# side wait for it.
    window.vrReady = () => !!window.vrScene;
  </script>

  <!-- The glTF loader addons import from the bare specifier "three". This points that at the same
       file scene.js loads, so the whole page shares ONE three.js instance — two copies means the
       loader's Object3D is not the renderer's Object3D, and nothing you load ever appears. -->
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.min.js"
      }
    }
  </script>

  <script src="mic.js"></script>
  <script type="module" src="scene.js"></script>
  <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
